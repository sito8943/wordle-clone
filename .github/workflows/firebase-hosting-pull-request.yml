name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
env:
  VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
  VITE_WORD_LIST_BUTTON_ENABLED: ${{ vars.VITE_WORD_LIST_BUTTON_ENABLED || 'true' }}
  VITE_WORD_REPORT_PHONE_NUMBER: ${{ vars.VITE_WORD_REPORT_PHONE_NUMBER }}
  VITE_WORD_REPORT_BUTTON_ENABLED: ${{ vars.VITE_WORD_REPORT_BUTTON_ENABLED || 'true' }}
  VITE_PAYPAL_DONATION_BUTTON_ENABLED: ${{ vars.VITE_PAYPAL_DONATION_BUTTON_ENABLED || 'true' }}
  VITE_SHARE_BUTTON_ENABLED: ${{ vars.VITE_SHARE_BUTTON_ENABLED || 'true' }}
  VITE_DEV_CONSOLE_ENABLED: ${{ vars.VITE_DEV_CONSOLE_ENABLED || 'true' }}
  VITE_SOUND_ENABLED: ${{ vars.VITE_SOUND_ENABLED || 'true' }}
  VITE_HINTS_ENABLED: ${{ vars.VITE_HINTS_ENABLED || 'true' }}
  VITE_HELP_BUTTON_ENABLED: ${{ vars.VITE_HELP_BUTTON_ENABLED || 'true' }}
  SOUND_ENABLED: ${{ vars.SOUND_ENABLED || 'true' }}
  HINTS_ENABLED: ${{ vars.HINTS_ENABLED || 'true' }}
  HELP_BUTTON_ENABLED: ${{ vars.HELP_BUTTON_ENABLED || 'true' }}
  VITE_PAYPAL_DONATION_BUTTON_URL: ${{ vars.VITE_PAYPAL_DONATION_BUTTON_URL }}
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env for production build
        run: |
          {
            echo "VITE_CONVEX_URL=${VITE_CONVEX_URL}"
            echo "VITE_WORD_LIST_BUTTON_ENABLED=${VITE_WORD_LIST_BUTTON_ENABLED:-true}"
            echo "VITE_WORD_REPORT_PHONE_NUMBER=${VITE_WORD_REPORT_PHONE_NUMBER}"
            echo "VITE_WORD_REPORT_BUTTON_ENABLED=${VITE_WORD_REPORT_BUTTON_ENABLED:-true}"
            echo "VITE_PAYPAL_DONATION_BUTTON_ENABLED=${VITE_PAYPAL_DONATION_BUTTON_ENABLED:-true}"
            echo "VITE_SHARE_BUTTON_ENABLED=${VITE_SHARE_BUTTON_ENABLED:-true}"
            echo "VITE_DEV_CONSOLE_ENABLED=${VITE_DEV_CONSOLE_ENABLED:-true}"
            echo "VITE_SOUND_ENABLED=${VITE_SOUND_ENABLED:-true}"
            echo "VITE_HINTS_ENABLED=${VITE_HINTS_ENABLED:-true}"
            echo "VITE_HELP_BUTTON_ENABLED=${VITE_HELP_BUTTON_ENABLED:-true}"
            echo "SOUND_ENABLED=${SOUND_ENABLED:-true}"
            echo "HINTS_ENABLED=${HINTS_ENABLED:-true}"
            echo "HELP_BUTTON_ENABLED=${HELP_BUTTON_ENABLED:-true}"
            echo "VITE_PAYPAL_DONATION_BUTTON_URL=${VITE_PAYPAL_DONATION_BUTTON_URL}"
          } > .env
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SITOS_LIBRARY }}
          projectId: sitos-library
