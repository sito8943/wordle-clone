name: Verify and Deploy

on:
  push:
  workflow_dispatch:

env:
  VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
  VITE_APP_VERSION: ${{ vars.VITE_APP_VERSION }}
  VITE_WORD_LIST_BUTTON_ENABLED: ${{ vars.VITE_WORD_LIST_BUTTON_ENABLED || 'true' }}
  VITE_WORD_REPORT_PHONE_NUMBER: ${{ vars.VITE_WORD_REPORT_PHONE_NUMBER }}
  VITE_WORD_REPORT_BUTTON_ENABLED: ${{ vars.VITE_WORD_REPORT_BUTTON_ENABLED || 'true' }}
  VITE_PAYPAL_DONATION_BUTTON_ENABLED: ${{ vars.VITE_PAYPAL_DONATION_BUTTON_ENABLED || 'true' }}
  VITE_SHARE_BUTTON_ENABLED: ${{ vars.VITE_SHARE_BUTTON_ENABLED || 'true' }}
  VITE_DEV_CONSOLE_ENABLED: ${{ vars.VITE_DEV_CONSOLE_ENABLED || 'true' }}
  VITE_SOUND_ENABLED: ${{ vars.VITE_SOUND_ENABLED || 'true' }}
  VITE_HINTS_ENABLED: ${{ vars.VITE_HINTS_ENABLED || 'true' }}
  VITE_HELP_BUTTON_ENABLED: ${{ vars.VITE_HELP_BUTTON_ENABLED || 'true' }}
  SOUND_ENABLED: ${{ vars.SOUND_ENABLED || 'true' }}
  HINTS_ENABLED: ${{ vars.HINTS_ENABLED || 'true' }}
  HELP_BUTTON_ENABLED: ${{ vars.HELP_BUTTON_ENABLED || 'true' }}
  VITE_PAYPAL_DONATION_BUTTON_URL: ${{ vars.VITE_PAYPAL_DONATION_BUTTON_URL }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint-typecheck
      - name: ESLint
        run: npm run lint-eslint
      - name: Prettier
        run: npm run lint-prettier
      - name: depcheck
        run: npm run lint-depcheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [verify, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Validate production frontend env
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        run: |
          if [ -z "${VITE_CONVEX_URL}" ]; then
            echo "VITE_CONVEX_URL is empty. Set repository variable VITE_CONVEX_URL."
            exit 1
          fi

      - name: Build
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Add SPA fallback page
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    needs: [verify, test]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Validate Convex deploy key
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "${CONVEX_DEPLOY_KEY}" ]; then
            echo "CONVEX_DEPLOY_KEY is empty. Add it as a repository secret."
            exit 1
          fi

      - name: Deploy Convex backend
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npm run convex:deploy

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: github-pages
    needs: [build, deploy-convex]

    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      id-token: write
      pages: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
